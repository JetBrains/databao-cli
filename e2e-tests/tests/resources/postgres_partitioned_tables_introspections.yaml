datasource_id: my_postgres.yaml
datasource_type: postgres
context:
  catalogs:
  - name: test
    schemas:
    - name: public
      tables:
      - name: all_types_demo
        columns:
        - name: id
          type: integer
          nullable: false
          default_expression: nextval('all_types_demo_id_seq'::regclass)
        - name: small_int_col
          type: smallint
          nullable: true
        - name: int_col
          type: integer
          nullable: true
        - name: big_int_col
          type: bigint
          nullable: true
        - name: numeric_col
          type: numeric(10,2)
          nullable: true
        - name: real_col
          type: real
          nullable: true
        - name: double_col
          type: double precision
          nullable: true
        - name: money_col
          type: money
          nullable: true
        - name: char_col
          type: character(5)
          nullable: true
        - name: varchar_col
          type: character varying(50)
          nullable: true
        - name: text_col
          type: text
          nullable: true
        - name: boolean_col
          type: boolean
          nullable: true
        - name: date_col
          type: date
          nullable: true
        - name: time_col
          type: time without time zone
          nullable: true
        - name: timetz_col
          type: time with time zone
          nullable: true
        - name: timestamp_col
          type: timestamp without time zone
          nullable: true
        - name: timestamptz_col
          type: timestamp with time zone
          nullable: true
        - name: interval_col
          type: interval
          nullable: true
        - name: json_col
          type: json
          nullable: true
        - name: jsonb_col
          type: jsonb
          nullable: true
        - name: int_array_col
          type: integer[]
          nullable: true
        - name: text_array_col
          type: text[]
          nullable: true
        - name: bytea_col
          type: bytea
          nullable: true
        - name: status_col
          type: text
          nullable: true
        - name: inet_col
          type: inet
          nullable: true
        - name: cidr_col
          type: cidr
          nullable: true
        - name: macaddr_col
          type: macaddr
          nullable: true
        - name: point_col
          type: point
          nullable: true
        - name: circle_col
          type: circle
          nullable: true
        - name: bit_col
          type: bit(4)
          nullable: true
        - name: bitvarying_col
          type: bit varying(8)
          nullable: true
        - name: xml_col
          type: xml
          nullable: true
        samples:
        - id: 1
          small_int_col: 10
          int_col: 1000
          big_int_col: 10000000000
          numeric_col: '12345.67'
          real_col: 3.140000104904175
          double_col: 3.1415926535
          money_col: $99.99
          char_col: ABCDE
          varchar_col: Hello PostgreSQL
          text_col: This is a long text column
          boolean_col: true
          date_col: 2025-01-01
          time_col: '12:30:00'
          timetz_col: 12:30:00+02:00
          timestamp_col: 2025-01-01 12:30:00
          timestamptz_col: 2025-01-01 10:30:00+00:00
          interval_col: 2 days, 3:00:00
          json_col: '{"key": "value"}'
          jsonb_col: '{"key": "value"}'
          int_array_col: '[1, 2, 3]'
          text_array_col: '["a", "b", "c"]'
          bytea_col: <bytes, 4 bytes>
          status_col: active
          inet_col: 192.168.1.1
          cidr_col: '"192.168.0.0/24"'
          macaddr_col: 08:00:2b:01:02:03
          point_col: '[1.0, 2.0]'
          circle_col: '[[1.0, 2.0], 5.0]'
          bit_col: <BitString 1010>
          bitvarying_col: <BitString 1010 10>
          xml_col: <root><child>value</child></root>
        kind: table
        primary_key:
          name: all_types_demo_pkey
          columns:
          - id
          validated: true
        checks:
        - name: all_types_demo_status_col_check
          expression: (status_col = ANY (ARRAY['active'::text, 'inactive'::text, 'pending'::text]))
          validated: true
      - name: sales
        columns:
        - name: id
          type: integer
          nullable: false
          default_expression: nextval('sales_id_seq'::regclass)
        - name: sale_date
          type: date
          nullable: false
        - name: amount
          type: numeric(10,2)
          nullable: true
        - name: product_name
          type: character varying(100)
          nullable: true
        - name: region
          type: character varying(50)
          nullable: true
        samples:
        - id: 1
          sale_date: 2024-01-15
          amount: '150.00'
          product_name: Product A
          region: North
        - id: 2
          sale_date: 2024-05-20
          amount: '250.50'
          product_name: Product B
          region: South
        - id: 3
          sale_date: 2024-08-10
          amount: '175.75'
          product_name: Product C
          region: East
        partition_info:
          meta:
            partitioning_strategy: range partitioned
            columns_in_partition_key:
            - sale_date
          partition_tables:
          - sales_2024_q1
          - sales_2024_q2
          - sales_2024_q3
        kind: table
