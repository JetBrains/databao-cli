repos:
  - repo: local
    hooks:
      - id: uv-lock
        name: uv-lock
        description: Check if the uv lockfile is up-to-date
        entry: uv lock
        args: ["--check"]
        pass_filenames: false
        language: system

      - id: ruff-check
        name: ruff-check
        types: [python]
        description: Lint with ruff
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        pass_filenames: false

      - id: ruff-format
        name: ruff-format
        types: [python]
        description: Format with ruff
        entry: uv run ruff format
        language: system
        pass_filenames: false

      - id: mypy
        name: mypy
        types: [ python ]
        description: Verify types statically
        entry: uv run mypy
        language: system
        pass_filenames: false

      - id: sync-agent-context
        name: sync-agent-context
        description: Regenerate CLAUDE.md and .cursorrules from docs/agent-shared.md
        entry: scripts/sync-agent-context.sh
        language: script
        pass_filenames: false
        files: ^(docs/agent-shared\.md|scripts/sync-agent-context\.sh)$

      - id: validate-agent-guidance
        name: validate-agent-guidance
        description: Validate agent skills and guidance docs structure
        entry: scripts/validate-agent-guidance.sh
        language: script
        pass_filenames: false
        files: ^(\.claude/skills/|\.cursor/rules/|docs/(agent-shared|coding-guidelines|architecture|testing-strategy)\.md|scripts/(sync-agent-context|validate-agent-guidance)\.sh)$