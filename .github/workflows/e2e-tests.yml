name: E2e tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  e2e-tests-ubuntu:
    name: "Run e2e tests on ubuntu"
    runs-on: sre-eqx-kata
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up project
        uses: ./.github/actions/setup-project
        with:
          python-version: 3.12

      - name: Run e2e tests
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_TEST_USER: ${{ secrets.SNOWFLAKE_TEST_USER }}
          SNOWFLAKE_TEST_USER_PROGRAM_TOKEN: ${{ secrets.SNOWFLAKE_TEST_USER_PROGRAM_TOKEN }}
        run: uv run pytest e2e-tests

      - name: Run e2e tests
        shell: bash
        if: always()
        run: ls -R e2e-tests

      - name: Upload Tests artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          retention-days: 10
          compression-level: 6
          name: artifacts
          path: e2e-tests/artifacts/
