[project]
name = "databao-cli"
version = "0.1.0"
description = ""
authors = [
    {name = "Maryia Lapatsina", email = "maryia.lapatsina@jetbrains.com"},
    {name = "Yury Khudyakov", email = "yury.khudyakov@jetbrains.com"}
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "click>=8.2.1,<9.0.0",
    "databao-context-engine>=0.1.4.dev1",
    "prettytable>=3.10.0",
    "databao[ui] @ git+ssh://git@github.com/JetBrains/databao-agent.git@ykhudyakov/ui",
]

[project.scripts]
databao = "databao_cli.__main__:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/databao_cli"]

[dependency-groups]
dev = [
    "pytest>=9.0.2,<10.0.0",
    "ruff>=0.9.0,<1.0.0",
]

[tool.ruff]
line-length = 127
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
