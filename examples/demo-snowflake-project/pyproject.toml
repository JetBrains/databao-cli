[project]
name = "databao-demo-snowflake-project"
version = "0.1.0"
description = "Databao demo project for Snowflake"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "databao-cli",
    "adbc-driver-snowflake>=1.10.0",
    "adbc-driver-manager>=1.10.0",
]

[tool.uv.sources]
databao-cli = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/databao_snowflake_demo"]
