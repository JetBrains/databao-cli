type: snowflake
name: snowflake
connection:
  account: {{ env_var('SNOWFLAKE_ACCOUNT') }}
  warehouse: {{ env_var('SNOWFLAKE_DS_WAREHOUSE') }}
  database: {{ env_var('SNOWFLAKE_DS_DATABASE') }}
  additional_properties:
    host: {{ env_var('SNOWFLAKE_HOST') }}
  auth:
    token: {{ env_var('SNOWFLAKE_DS_TOKEN') }}
